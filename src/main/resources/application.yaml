server:
  address: localhost
  port: 9090
  servlet.context-path: /console

spring:
  main:
    banner-mode: console
  application:
    name: aquariuxtrd
    version: 1.0.0-SNAPSHOT
  datasource:
    username: sa
    password: password
    url: 'jdbc:h2:file:./.local-volumes/data/aquariuxtrd;DB_CLOSE_ON_EXIT=TRUE'
    driverClassName: 'org.h2.Driver'
  h2:
    console:
      enabled: true
      path: '/h2-console'
      settings.web-allow-others: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate.ddl-auto: update
    show-sql: true
app:
  client:
    binance.url: https://api.binance.com/api/v3/ticker/bookTicker
    houbi.url: https://api.huobi.pro/market/tickers
  supported-cryptos: >
    BTCUSDT,ETHUSDT
